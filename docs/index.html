<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>LispE</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .buttons {
            flex-shrink: 0;
            padding: 5px 0;
        }

        .codeRow {
            flex: 1;
            display: flex;
            flex-direction: row;
            min-height: 0;
            gap: 10px;
            padding: 5px 0;
        }

        .textAreaCode {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .textAreaCode span {
            display: block;
            text-align: center;
            flex-shrink: 0;
        }

        .textAreaCode textarea {
            flex: 1;
            width: 100%;
            min-height: 0;
            resize: none;
            box-sizing: border-box;
        }

        .textAreaColumn {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: 5px 0;
        }

        .textAreaColumn span {
            display: block;
            text-align: center;
            flex-shrink: 0;
        }

        .textAreaColumn textarea {
            flex: 1;
            width: 100%;
            min-height: 0;
            resize: none;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div class="buttons">
        <input type="button" value="RESET/RUN" OnClick="reset_run_code()" id="button_reset_run" />
        <input type="button" value="RUN" OnClick="run_code_from()" id="button_run" />
        <input type="button" value="Indent" OnClick="indentation_code()" id="button_indent" />
        <input type="button" value="Clear" OnClick="clear_output()" id="button_clear_output" />
        <input type="button" value="Python" OnClick="run_python()" id="button_python" disabled />
    </div>
    <div class="codeRow">
        <div class="textAreaCode">
            <span>Code</span>
            <textarea name="code" id="get_code">; You can call a function in the pattern definition of the function
(defun checking (x y) (eq 0 (% y x)))

; the argument should be an integer, whose value is a multiple of 15
; The argument is stored in x
(defpat fizzbuzz ((integer_ (checking 15 x))) 'fizzbuzz)
(defpat fizzbuzz ((integer_ (checking 3 x))) 'fizz)
(defpat fizzbuzz ((integer_ (checking 5 x))) 'buzz)
(defpat fizzbuzz (x) x)
(mapcar 'fizzbuzz (range 1 100 1))</textarea>
        </div>
        <div class="textAreaCode">
            <span>Transpilation</span>
            <textarea name="transpilation" id="display_transpilation" readonly></textarea>
        </div>
    </div>
    <div class="textAreaColumn">
        <span>OUTPUT</span>
        <textarea name="evaluated" id="display_evaluation"></textarea>
    </div>
    <!-- We load our WASM library -->
    <script type="text/javascript">
        // The initialisation below makes it possible to catch the print and println in your LispE code.
        // It automatically stores in 'display_evaluation' textarea the values that are printed.
        var Module = {
            preRun: [],
            postRun: [],
            print: (function () {
                var element = document.getElementById('display_evaluation');
                if (element) element.value = '';
                return function (text) {
                    if (arguments.length > 1)
                        text = Array.prototype.slice.call(arguments).join(' ');
                    if (element) {
                        element.value += text + "\n";
                        element.scrollTop = element.scrollHeight; // focus on bottom
                    }
                };
            })(),
            printErr: (function () {
                var element = document.getElementById('display_evaluation');
                if (element) element.value = '';
                return function (text) {
                    if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                    // These replacements are necessary if you render to raw HTML
                    text = text.replace(/&/g, "&amp;");
                    text = text.replace(/</g, "&lt;");
                    text = text.replace(/>/g, "&gt;");
                    text = text.replace('\n', '<br>', 'g');
                    console.log(text);
                    if (element) {
                        element.value += text + "\n";
                        element.scrollTop = element.scrollHeight; // focus on bottom
                    }
                };
            })()
        };
    </script>
    <script type="text/javascript" src="lispe.js"></script>
    <script type="text/javascript" src="lispe_functions.js"></script>
    <script type="text/javascript" src="basic_string.js"></script>
    <script type="text/javascript" src="transpiler_string.js"></script>

    <script type="text/javascript">

        var textFontSize = 14 + "px";
        var buttonHeight = 50 + "px";
        var buttonWidth = 130 + "px";
        var buttonFont = 12 + "px";

        document.getElementById('get_code').style.fontSize = textFontSize;
        document.getElementById('display_transpilation').style.fontSize = textFontSize;
        document.getElementById('display_evaluation').style.fontSize = textFontSize;

        document.getElementById('button_run').style.height = buttonHeight;
        document.getElementById('button_run').style.width = buttonWidth;
        document.getElementById("button_run").style.fontWeight = "bolder";
        document.getElementById('button_run').style.fontSize = buttonFont;

        document.getElementById('button_reset_run').style.height = buttonHeight;
        document.getElementById('button_reset_run').style.width = buttonWidth;
        document.getElementById("button_reset_run").style.fontWeight = "bolder";
        document.getElementById("button_reset_run").style.color = "red";
        document.getElementById('button_reset_run').style.fontSize = buttonFont;

        document.getElementById('button_indent').style.height = buttonHeight;
        document.getElementById('button_indent').style.width = buttonWidth;
        document.getElementById('button_indent').style.fontSize = buttonFont;

        document.getElementById('button_clear_output').style.height = buttonHeight;
        document.getElementById('button_clear_output').style.width = buttonWidth;
        document.getElementById('button_clear_output').style.fontSize = buttonFont;

        document.getElementById('button_python').style.height = buttonHeight;
        document.getElementById('button_python').style.width = buttonWidth;
        document.getElementById('button_python').style.fontSize = buttonFont;
        document.getElementById('button_python').style.fontWeight = "bolder";
        document.getElementById('button_python').style.color = "blue";

        // ------------------------------------------------------------------
        // State
        // ------------------------------------------------------------------
        // Index of the secondary LispE interpreter dedicated to the Python
        // transpiler. -1 until the runtime is initialised.
        var pythonInterpreterIdx = -1;
        var lastposition = 0;

        // ------------------------------------------------------------------
        // Runtime initialisation: load the Python transpiler in a dedicated
        // interpreter so it survives resets of the main one (idx=0).
        // ------------------------------------------------------------------
        Module.onRuntimeInitialized = function () {
            try {
                pythonInterpreterIdx = callCreateLispE();
                callEvalLispE(pythonInterpreterIdx, basic_code);
                callEvalLispE(pythonInterpreterIdx, transpiler_code);
                document.getElementById('button_python').disabled = false;
            } catch (e) {
                console.error("Failed to initialise Python transpiler:", e);
            }
        };

        // ------------------------------------------------------------------
        // Caret helpers
        // (from https://www.vishalon.net/blog/javascript-getting-and-setting-caret-position-in-textarea)
        // ------------------------------------------------------------------
        function getCaretPosition(ctrl) {
            // IE < 9
            if (document.selection) {
                ctrl.focus();
                var range = document.selection.createRange();
                var rangelen = range.text.length;
                range.moveStart('character', -ctrl.value.length);
                var start = range.text.length - rangelen;
                return { 'start': start, 'end': start + rangelen };
            }
            // IE >= 9 and other browsers
            else if (ctrl.selectionStart || ctrl.selectionStart == '0') {
                return { 'start': ctrl.selectionStart, 'end': ctrl.selectionEnd };
            }
            return { 'start': 0, 'end': 0 };
        }

        function setCaretPosition(ctrl, start, end) {
            if (ctrl.setSelectionRange) {
                ctrl.focus();
                ctrl.setSelectionRange(start, end);
            } else if (ctrl.createTextRange) {
                var range = ctrl.createTextRange();
                range.collapse(true);
                range.moveEnd('character', end);
                range.moveStart('character', start);
                range.select();
            }
        }

        // ------------------------------------------------------------------
        // Output helper
        // ------------------------------------------------------------------
        function appendOutput(text) {
            var eval_output = document.getElementById('display_evaluation');
            eval_output.value += text + "\n";
            eval_output.scrollTop = eval_output.scrollHeight;
        }

        // ------------------------------------------------------------------
        // Run all the code in the editor.
        // ------------------------------------------------------------------
        function run_code() {
            var code_text = document.getElementById('get_code');
            var res;
            try {
                res = callEvalLispE(1, code_text.value);
            } catch (e) {
                res = e;
            }
            lastposition = code_text.value.length;
            appendOutput(res);
        }

        // ------------------------------------------------------------------
        // Indent the code in the editor.
        // ------------------------------------------------------------------
        function indentation_code() {
            var code_text = document.getElementById('get_code');
            try {
                code_text.value = callIndent(code_text.value);
            } catch (e) {
                appendOutput("Indentation error: " + e);
            }
        }

        // ------------------------------------------------------------------
        // Run only the code typed since the last evaluation, starting from
        // the caret's previously remembered position.
        // ------------------------------------------------------------------
        function run_code_from() {
            var txt = document.getElementById('get_code');

            var carret = getCaretPosition(txt);
            if (carret["start"] < lastposition)
                lastposition = carret["start"];
            setCaretPosition(txt, lastposition, txt.value.length);

            var code = txt.value.substring(lastposition);
            lastposition = txt.value.length;

            var res;
            try {
                res = callEvalLispE(1, code);
            } catch (e) {
                res = e;
            }
            appendOutput(res);
        }

        // ------------------------------------------------------------------
        // Reset the main interpreter and run the editor's code from scratch.
        // ------------------------------------------------------------------
        function reset_run_code() {
            document.getElementById('display_evaluation').value = "";
            try {
                callResetLispE(1);
            } catch (e) {
                appendOutput("Reset error: " + e);
                return;
            }
            run_code();
        }

        // ------------------------------------------------------------------
        // Clear all editor and output panels.
        // ------------------------------------------------------------------
        function clear_output() {
            document.getElementById('display_evaluation').value = "";
            document.getElementById('display_transpilation').value = "";
            document.getElementById('get_code').value = "";
        }

        // ------------------------------------------------------------------
        // Transpile the editor's content (assumed Python) into LispE using
        // the dedicated transpiler interpreter, then evaluate it in the main
        // interpreter (idx=0).
        // ------------------------------------------------------------------
        function run_python() {
            if (pythonInterpreterIdx < 0) {
                appendOutput("Python transpiler is not ready yet.");
                return;
            }

            var code_text = document.getElementById('get_code').value;
            var transpilation_output = document.getElementById('display_transpilation');
            var eval_output = document.getElementById('display_evaluation');
            transpilation_output.value = "";
            eval_output.value = "";

            try {
                var transpiled = callEvalLispE(
                    pythonInterpreterIdx,
                    '(compilepython «' + code_text + '»)'
                );
                transpilation_output.value = transpiled;

                if (transpiled.indexOf('ERROR>>>') === -1) {
                    callResetLispE(1);
                    var res = callEvalLispE(1, transpiled);
                    appendOutput(res);
                } else {
                    eval_output.value = "Transpilation error detected.\n" + transpiled;
                }
            } catch (e) {
                appendOutput("Error: " + e);
            }
        }

    </script>
</body>

</html>
